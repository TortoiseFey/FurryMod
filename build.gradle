// build.gradle
plugins {
    id 'java'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '5.1.0'
}

repositories {
    mavenCentral()
}

dependencies {
    minecraft 'com.mojang:minecraft:1.21.1'
    mappings 'net.minecraftforge:mapping:1.21.1'
    // Forge mod dependencies can be added here
}

minecraft {
    // The Minecraft version being targeted
    officialMojangMappings()
    // The specific texture pack used
    useDepForge()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}